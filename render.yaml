# Render Blueprint: https://render.com/docs/infrastructure-as-code
# Deploy: New → Blueprint → Connect this repo → apply (or paste this file).
#
# Order: deploy the API first, copy its URL, then set frontend VITE_API_URL and backend CORS_ORIGINS.

version: "1"

services:
  # Node API (Docker) — https://render.com/docs/docker
  - type: web
    name: margav-crm-api
    runtime: docker
    region: frankfurt # EU; use oregon / singapore if you prefer
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Add in dashboard as needed: TWILIO_*, LEAD_IMPORT_API_KEY, etc.

  # Vite static app — https://render.com/docs/static-sites
  - type: web
    name: margav-crm-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Must be your API URL + /api (e.g. https://margav-crm-api.onrender.com/api)
      - key: VITE_API_URL
        sync: false
