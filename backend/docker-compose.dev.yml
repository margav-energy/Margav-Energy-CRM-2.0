# Development compose - Postgres only, run API locally with npm run dev
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: margav-crm-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: margav_crm
    ports:
      - "5432:5432"
    volumes:
      - margav_postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  margav_postgres_dev_data:
